services:
  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    depends_on:
      qdrant:
        condition: service_healthy
      opensearch:
        condition: service_started
    volumes:
      - model_cache:/root/.cache

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./.docker_volumes/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  opensearch:
    image: opensearchproject/opensearch:2
    restart: always
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./.docker_volumes/opensearch_data:/usr/share/opensearch/data

volumes:
  model_cache:
