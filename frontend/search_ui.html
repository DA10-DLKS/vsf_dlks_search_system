<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OTA AI Search Demo</title>
    <style>
      :root {
        --bg: #f4f7f9;
        --panel: #ffffff;
        --text: #17212b;
        --muted: #667789;
        --line: #d8e0e7;
        --brand: #0d6b63;
        --accent: #d86f2f;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .app {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px;
      }

      header {
        margin-bottom: 20px;
      }

      h1,
      h2,
      h3,
      h4,
      p {
        margin-top: 0;
      }

      .flow {
        display: grid;
        grid-template-columns: repeat(7, minmax(90px, 1fr));
        gap: 8px;
        margin: 16px 0 24px;
      }

      .flow span {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 6px;
        padding: 10px;
        text-align: center;
        font-size: 13px;
        font-weight: 700;
      }

      .search-panel,
      .result-card,
      .state {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }

      .search-panel {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .search-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: var(--brand);
        color: #fff;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 700;
      }

      button.secondary {
        background: #e8eef2;
        color: var(--text);
      }

      .demo-queries {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .demo-queries button {
        background: #e8eef2;
        color: var(--text);
        font-weight: 600;
      }

      .results {
        display: grid;
        gap: 14px;
      }

      .results-title {
        margin: 4px 0 0;
        font-size: 20px;
      }

      .result-header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: start;
      }

      .score {
        background: #eaf6f3;
        color: var(--brand);
        border-radius: 999px;
        padding: 8px 10px;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      section.block {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
        min-width: 0;
      }

      .block h4 {
        margin-bottom: 8px;
      }

      dl {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin: 0;
      }

      dt {
        color: var(--muted);
        font-size: 12px;
      }

      dd {
        margin: 2px 0 0;
        font-weight: 700;
      }

      ul,
      ol {
        margin: 0;
        padding-left: 20px;
      }

      li {
        margin-bottom: 8px;
      }

      small,
      .muted {
        color: var(--muted);
      }

      details {
        margin-top: 8px;
      }

      summary {
        cursor: pointer;
        font-weight: 700;
      }

      .fallback {
        color: var(--muted);
        margin: 0;
      }

      .state {
        margin-top: 14px;
      }

      .state.error {
        border-color: #f2b8b5;
        color: var(--danger);
      }

      .hidden {
        display: none;
      }

      .llm-box {
        border-left: 4px solid var(--accent);
        background: #fff8f3;
        padding: 10px;
        border-radius: 4px;
        margin-top: 12px;
      }

      @media (max-width: 820px) {
        .app {
          padding: 18px;
        }

        .flow,
        .grid,
        .search-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>OTA AI Search Demo</h1>
        <p class="muted">User Query -> Top-K Results -> Metadata -> Citation -> Source Documents -> Context Chunks -> LLM Consumption</p>
      </header>

      <nav class="flow" aria-label="RAG flow">
        <span>User Query</span>
        <span>Top-K Results</span>
        <span>Metadata</span>
        <span>Citation</span>
        <span>Source Documents</span>
        <span>Context Chunks</span>
        <span>LLM Consumption</span>
      </nav>

      <section class="search-panel">
        <form id="searchForm">
          <label for="queryInput">Search query</label>
          <div class="search-row">
            <input id="queryInput" value="Tôi muốn resort yên tĩnh gần biển cho gia đình" />
            <button type="submit">Search</button>
          </div>
        </form>
        <div class="demo-queries" id="demoQueries"></div>
      </section>

      <div id="state"></div>
      <main class="results" id="results"></main>
    </div>

    <script>
      const mockData = {
        queries: [
          {
            query: "Tôi muốn resort yên tĩnh gần biển cho gia đình",
            results: [
              {
                id: "hotel_805030",
                title: "Vinpearl Resort & Spa Nha Trang Bay",
                snippet: "Khu nghỉ dưỡng gần biển, không gian riêng tư, phù hợp gia đình cần nghỉ dưỡng yên tĩnh tại Nha Trang.",
                score: 0.94,
                metadata: {
                  location: "Nha Trang, Khánh Hòa",
                  category: "Beach resort",
                  amenities: ["Bãi biển riêng", "Hồ bơi", "Kids club", "Spa"],
                  ranking_info: "High semantic match for quiet beach family resort",
                  price_level: "Premium"
                },
                citations: [
                  {
                    id: "cit_805030_01",
                    source_document_id: "doc_805030",
                    chunk_id: "chunk_805030_family",
                    label: "Hotel detail page",
                    quote: "Family-friendly resort amenities include beach access, pool and children facilities."
                  }
                ],
                source_documents: [
                  {
                    id: "doc_805030",
                    title: "Vinpearl Resort & Spa Nha Trang Bay hotel detail",
                    type: "hotel_detail",
                    path: "data/raw/hotels/hotel_805030_vinpearl-resort-spa-nha-trang-bay.json"
                  }
                ],
                context_chunks: [
                  {
                    id: "chunk_805030_family",
                    source_document_id: "doc_805030",
                    text: "Resort gần biển với tiện ích phù hợp gia đình: bãi biển, hồ bơi, khu vui chơi trẻ em và dịch vụ nghỉ dưỡng.",
                    rank: 1
                  },
                  {
                    id: "chunk_805030_location",
                    source_document_id: "doc_805030",
                    text: "Vị trí tại Nha Trang Bay giúp khách dễ tiếp cận trải nghiệm biển nhưng vẫn giữ cảm giác nghỉ dưỡng tách biệt.",
                    rank: 2
                  }
                ]
              }
            ]
          },
          {
            query: "Khách sạn phù hợp cho chuyến công tác ở trung tâm",
            results: [
              {
                id: "hotel_6428322",
                title: "Vinpearl Landmark 81, Autograph Collection",
                snippet: "Khách sạn cao cấp tại trung tâm TP.HCM, phù hợp chuyến công tác, gặp đối tác và di chuyển trong thành phố.",
                score: 0.96,
                metadata: {
                  location: "Bình Thạnh, TP. Hồ Chí Minh",
                  category: "Business hotel",
                  amenities: ["Trung tâm", "Phòng họp", "Nhà hàng", "Wi-Fi"],
                  ranking_info: "Top match for central business hotel intent",
                  price_level: "Luxury"
                },
                citations: [
                  {
                    id: "cit_6428322_01",
                    source_document_id: "doc_6428322",
                    chunk_id: "chunk_6428322_business",
                    label: "Hotel detail page",
                    quote: "Central hotel with premium services suitable for business stays."
                  }
                ],
                source_documents: [
                  {
                    id: "doc_6428322",
                    title: "Vinpearl Landmark 81 hotel detail",
                    type: "hotel_detail",
                    path: "data/raw/hotels/hotel_6428322_vinpearl-landmark-81-autograph-collection.json"
                  }
                ],
                context_chunks: [
                  {
                    id: "chunk_6428322_business",
                    source_document_id: "doc_6428322",
                    text: "Khách sạn nằm tại khu vực trung tâm, phù hợp khách công tác cần dịch vụ cao cấp, kết nối nhanh và tiện ích làm việc.",
                    rank: 1
                  }
                ]
              },
              {
                id: "hotel_4947690",
                title: "Melia Vinpearl Riverfront Đà Nẵng",
                snippet: "Lựa chọn phù hợp cho công tác tại Đà Nẵng với vị trí ven sông, tiện nghi khách sạn và kết nối trung tâm.",
                score: 0.87,
                metadata: {
                  location: "Đà Nẵng",
                  category: "City hotel",
                  amenities: ["Vị trí trung tâm", "Wi-Fi", "Nhà hàng"],
                  ranking_info: "Good business travel match for Da Nang",
                  price_level: "Upper upscale"
                },
                citations: [],
                source_documents: [],
                context_chunks: []
              }
            ]
          },
          {
            query: "Địa điểm nghỉ dưỡng có tiện ích cho trẻ em",
            results: [
              {
                id: "hotel_625168",
                title: "Vinpearl Resort & Spa Phú Quốc",
                snippet: "Khu nghỉ dưỡng biển có nhiều tiện ích cho trẻ em, gia đình và hoạt động giải trí tại Phú Quốc.",
                score: 0.93,
                metadata: {
                  location: "Phú Quốc, Kiên Giang",
                  category: "Family resort",
                  amenities: ["Kids club", "Bãi biển", "Hồ bơi", "Hoạt động gia đình"],
                  ranking_info: "High match for children amenities and resort intent",
                  price_level: "Premium"
                },
                citations: [
                  {
                    id: "cit_625168_01",
                    source_document_id: "doc_625168",
                    chunk_id: "chunk_625168_kids",
                    label: "Hotel detail page",
                    quote: "Family resort with children-friendly facilities and beach activities."
                  }
                ],
                source_documents: [
                  {
                    id: "doc_625168",
                    title: "Vinpearl Resort & Spa Phú Quốc hotel detail",
                    type: "hotel_detail",
                    path: "data/raw/hotels/hotel_625168_vinpearl-resort-spa-phu-quoc.json"
                  }
                ],
                context_chunks: [
                  {
                    id: "chunk_625168_kids",
                    source_document_id: "doc_625168",
                    text: "Tiện ích cho gia đình gồm khu vui chơi trẻ em, hồ bơi, hoạt động ngoài trời và không gian nghỉ dưỡng ven biển.",
                    rank: 1
                  }
                ]
              }
            ]
          }
        ]
      };

      const queryInput = document.getElementById("queryInput");
      const searchForm = document.getElementById("searchForm");
      const demoQueries = document.getElementById("demoQueries");
      const state = document.getElementById("state");
      const results = document.getElementById("results");

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[char]);
      }

      function setState(type, message) {
        state.innerHTML = `<div class="state ${type}"><strong>${escapeHtml(message)}</strong></div>`;
      }

      function clearState() {
        state.innerHTML = "";
      }

      function renderDemoQueries() {
        demoQueries.innerHTML = mockData.queries
          .map((item) => `<button class="secondary" type="button" data-query="${escapeHtml(item.query)}">${escapeHtml(item.query)}</button>`)
          .join("");
      }

      function renderList(items) {
        results.innerHTML = `<h2 class="results-title">Top-K Results (${items.length})</h2>${items.map(renderResult).join("")}`;
      }

      function renderResult(result) {
        const metadata = result.metadata || {};
        const citations = result.citations || [];
        const docs = result.source_documents || [];
        const chunks = result.context_chunks || [];
        const llmContext = chunks.map((chunk) => chunk.text).join(" ");

        return `
          <article class="result-card">
            <div class="result-header">
              <div>
                <h2>${escapeHtml(result.title)}</h2>
                <p>${escapeHtml(result.snippet)}</p>
              </div>
              <span class="score">${Number(result.score || 0).toFixed(2)}</span>
            </div>
            <div class="grid">
              <section class="block">
                <h4>Metadata</h4>
                <dl>
                  <div><dt>Location</dt><dd>${escapeHtml(metadata.location || "Unknown location")}</dd></div>
                  <div><dt>Category</dt><dd>${escapeHtml(metadata.category || "Unknown category")}</dd></div>
                  <div><dt>Price</dt><dd>${escapeHtml(metadata.price_level || "Unknown")}</dd></div>
                  <div><dt>Ranking</dt><dd>${escapeHtml(metadata.ranking_info || "No ranking info")}</dd></div>
                </dl>
                <details>
                  <summary>Amenities</summary>
                  <p>${escapeHtml((metadata.amenities || []).join(", ") || "No amenities listed")}</p>
                </details>
              </section>
              <section class="block">
                <h4>Citations</h4>
                ${citations.length ? `<ul>${citations.map((citation) => `<li><strong>${escapeHtml(citation.label)}</strong><br /><small>${escapeHtml(citation.id)} / ${escapeHtml(citation.chunk_id)}</small><p>${escapeHtml(citation.quote || "")}</p></li>`).join("")}</ul>` : `<p class="fallback">No citation available.</p>`}
              </section>
              <section class="block">
                <h4>Source Documents</h4>
                ${docs.length ? `<ul>${docs.map((doc) => `<li><strong>${escapeHtml(doc.title)}</strong><br /><small>${escapeHtml(doc.path || doc.url || doc.id)}</small></li>`).join("")}</ul>` : `<p class="fallback">Source document unavailable.</p>`}
              </section>
              <section class="block">
                <h4>Context Chunks</h4>
                ${chunks.length ? `<ol>${chunks.map((chunk) => `<li><details ${chunk.rank === 1 ? "open" : ""}><summary>${escapeHtml(chunk.id)} / rank ${escapeHtml(chunk.rank)}</summary><p>${escapeHtml(chunk.text)}</p><small>Source: ${escapeHtml(chunk.source_document_id)}</small></details></li>`).join("")}</ol>` : `<p class="fallback">No context preview available.</p>`}
              </section>
            </div>
            <div class="llm-box">
              <strong>LLM Consumption Preview</strong>
              <p>${escapeHtml(llmContext || "No context package available for LLM consumption.")}</p>
            </div>
          </article>
        `;
      }

      function runSearch(query) {
        clearState();
        results.innerHTML = "";
        setState("loading", "Loading search results...");

        setTimeout(() => {
          const match = mockData.queries.find((item) => item.query.toLowerCase() === query.trim().toLowerCase());
          clearState();

          if (query.toLowerCase().includes("error")) {
            setState("error", "Mock Search API error. Try one of the demo queries.");
            return;
          }

          if (!match || !match.results.length) {
            setState("empty", "No matching OTA results were found.");
            return;
          }

          renderList(match.results);
        }, 350);
      }

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        runSearch(queryInput.value);
      });

      demoQueries.addEventListener("click", (event) => {
        if (event.target.matches("button[data-query]")) {
          queryInput.value = event.target.dataset.query;
          runSearch(queryInput.value);
        }
      });

      renderDemoQueries();
      runSearch(queryInput.value);
    </script>
  </body>
</html>
