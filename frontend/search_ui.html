<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OTA AI Search Demo</title>
    <style>
      :root {
        --bg: #f4f7f9;
        --panel: #ffffff;
        --text: #17212b;
        --muted: #667789;
        --line: #d8e0e7;
        --brand: #0d6b63;
        --accent: #d86f2f;
        --danger: #b42318;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .app { max-width: 1180px; margin: 0 auto; padding: 28px; }
      header { margin-bottom: 20px; }
      h1, h2, h3, h4, p { margin-top: 0; }
      .flow {
        display: grid;
        grid-template-columns: repeat(7, minmax(90px, 1fr));
        gap: 8px; margin: 16px 0 24px;
      }
      .flow span {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 6px;
        padding: 10px; text-align: center;
        font-size: 13px; font-weight: 700;
      }
      .search-panel, .result-card, .state {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
      }
      .search-panel { margin-bottom: 18px; }
      label { display: block; margin-bottom: 8px; font-weight: 700; }
      .search-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
      input, button { font: inherit; }
      input {
        width: 100%; border: 1px solid var(--line);
        border-radius: 6px; padding: 12px;
      }
      button {
        border: 0; border-radius: 6px;
        background: var(--brand); color: #fff;
        padding: 10px 14px; cursor: pointer; font-weight: 700;
      }
      button.secondary { background: #e8eef2; color: var(--text); }
      .demo-queries {
        display: flex; flex-wrap: wrap;
        gap: 8px; margin-top: 12px;
      }
      .demo-queries button { background: #e8eef2; color: var(--text); font-weight: 600; }
      .results { display: grid; gap: 14px; }
      .results-title { margin: 4px 0 0; font-size: 20px; }
      .result-header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px; align-items: start;
      }
      .score {
        background: #eaf6f3; color: var(--brand);
        border-radius: 999px; padding: 8px 10px; font-weight: 700;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px; margin-top: 14px;
      }
      section.block {
        border: 1px solid var(--line);
        border-radius: 6px; padding: 12px; min-width: 0;
      }
      .block h4 { margin-bottom: 8px; }
      dl {
        display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px; margin: 0;
      }
      dt { color: var(--muted); font-size: 12px; }
      dd { margin: 2px 0 0; font-weight: 700; }
      ul, ol { margin: 0; padding-left: 20px; }
      li { margin-bottom: 8px; }
      small, .muted { color: var(--muted); }
      details { margin-top: 8px; }
      summary { cursor: pointer; font-weight: 700; }
      .fallback { color: var(--muted); margin: 0; }
      .state { margin-top: 14px; }
      .state.error { border-color: #f2b8b5; color: var(--danger); }
      .hidden { display: none; }
      .llm-box {
        border-left: 4px solid var(--accent);
        background: #fff8f3; padding: 10px;
        border-radius: 4px; margin-top: 12px;
      }
      .intent-box {
        background: #f0f4ff; border: 1px solid #c8d6f0;
        border-radius: 6px; padding: 12px; margin-bottom: 14px;
      }
      .tag {
        display: inline-block; background: #e8eef2;
        border-radius: 4px; padding: 2px 8px; font-size: 12px; margin: 2px;
      }
      @media (max-width: 820px) {
        .app { padding: 18px; }
        .flow, .grid, .search-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>OTA AI Search Demo</h1>
        <p class="muted">User Query &rarr; Intent &rarr; Hybrid Search &rarr; Rerank &rarr; Results</p>
      </header>

      <nav class="flow" aria-label="RAG flow">
        <span>User Query</span>
        <span>Intent</span>
        <span>BM25+Vector</span>
        <span>Fusion</span>
        <span>Rerank</span>
        <span>Results</span>
        <span>LLM Context</span>
      </nav>

      <section class="search-panel">
        <form id="searchForm">
          <label for="queryInput">Search query (tiếng Việt)</label>
          <div class="search-row">
            <input id="queryInput" value="resort 5 sao gần biển Nha Trang" />
            <button type="submit">Search</button>
          </div>
        </form>
        <div class="demo-queries" id="demoQueries"></div>
      </section>

      <div id="state"></div>
      <main class="results" id="results"></main>
    </div>

    <script>
      const API_URL = location.origin === "null" ? "http://localhost:8000" : location.origin;

      const demoQueries = [
        "resort 5 sao gần biển Nha Trang",
        "khách sạn trung tâm Sài Gòn cho công tác",
        "nghỉ dưỡng có tiện ích cho trẻ em Phú Quốc",
        "homestay Đà Lạt view đẹp giá rẻ",
        "khách sạn Hà Nội gần hồ Gươm",
      ];

      const queryInput = document.getElementById("queryInput");
      const searchForm = document.getElementById("searchForm");
      const demoContainer = document.getElementById("demoQueries");
      const state = document.getElementById("state");
      const results = document.getElementById("results");

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
      }

      function setState(type, message) {
        state.innerHTML = `<div class="state ${type}"><strong>${escapeHtml(message)}</strong></div>`;
      }

      function clearState() {
        state.innerHTML = "";
      }

      function renderDemoQueries() {
        demoContainer.innerHTML = demoQueries
          .map((q) => `<button class="secondary" type="button" data-query="${escapeHtml(q)}">${escapeHtml(q)}</button>`)
          .join("");
      }

      function formatScore(v) {
        return Number(v || 0).toFixed(3);
      }

      function starLabel(rating) {
        if (!rating) return "";
        return "★".repeat(Math.floor(rating)) + (rating % 1 >= 0.5 ? "½" : "");
      }

      function renderHotel(h) {
        const m = h.metadata || {};
        const name = m.name || m.hotel_name || `Hotel #${h.hotel_id}`;
        const city = m.city || m.address_city || "";
        const star = m.star_rating;
        const reviewScore = m.review_score;
        const reviewCount = m.review_count;
        const accomType = m.accommodation_type || m.property_type || "";
        const address = m.address || "";
        const chunks = h.matched_chunks || [];
        const text = h.text || (chunks.length > 0 ? chunks.map(c => c.text || "").join(" ") : "");

        return `
          <article class="result-card">
            <div class="result-header">
              <div>
                <h2>${escapeHtml(name)}</h2>
                <p>${starLabel(star)} ${star ? star + " sao" : ""} ${accomType ? "&middot; " + escapeHtml(accomType) : ""}</p>
                <p>${escapeHtml(city)}${address ? " &middot; " + escapeHtml(address) : ""}</p>
              </div>
              <span class="score">${formatScore(h.score)}</span>
            </div>
            <div class="grid">
              <section class="block">
                <h4>Thông tin</h4>
                <dl>
                  <div><dt>Điểm đánh giá</dt><dd>${reviewScore ? reviewScore + "/10" : "N/A"}</dd></div>
                  <div><dt>Lượt đánh giá</dt><dd>${reviewCount ? reviewCount.toLocaleString() : "N/A"}</dd></div>
                  <div><dt>Hotel ID</dt><dd>${h.hotel_id}</dd></div>
                  <div><dt>Source</dt><dd>${escapeHtml(h.source || "N/A")}</dd></div>
                </dl>
              </section>
              <section class="block">
                <h4>Điểm số</h4>
                <dl>
                  <div><dt>Vector rank</dt><dd>${h.vector_rank != null ? h.vector_rank : "N/A"}</dd></div>
                  <div><dt>RRF score</dt><dd>${formatScore(h.rrf_score)}</dd></div>
                  <div><dt>Rerank score</dt><dd>${formatScore(h.rerank_score)}</dd></div>
                  <div><dt>Business score</dt><dd>${formatScore(h.business_score)}</dd></div>
                </dl>
              </section>
              ${chunks.length ? `
              <section class="block" style="grid-column: 1 / -1;">
                <h4>Matched Chunks (${chunks.length})</h4>
                <ol>${chunks.map((c, i) => `
                  <li>
                    <details ${i === 0 ? "open" : ""}>
                      <summary>${escapeHtml(c.section || "Section " + (i+1))} &middot; score=${formatScore(c.score)}</summary>
                      <p>${escapeHtml(c.text || "")}</p>
                    </details>
                  </li>`).join("")}
                </ol>
              </section>` : ""}
            </div>
            ${text ? `
            <div class="llm-box">
              <strong>LLM Context Preview</strong>
              <p>${escapeHtml(text.substring(0, 500))}</p>
            </div>` : ""}
          </article>
        `;
      }

      async function runSearch(query) {
        clearState();
        results.innerHTML = "";
        setState("loading", "Đang tìm kiếm...");

        try {
          const resp = await fetch(`${API_URL}/hybrid_search?q=${encodeURIComponent(query)}&top_n=5`, {
            signal: AbortSignal.timeout ? AbortSignal.timeout(120000) : undefined
          });

          if (!resp.ok) {
            const errText = await resp.text().catch(() => "Unknown error");
            throw new Error(`HTTP ${resp.status}: ${errText.substring(0, 200)}`);
          }

          const data = await resp.json();
          clearState();

          const hotels = data.top_hotels || [];
          if (hotels.length === 0) {
            setState("empty", "Không tìm thấy kết quả phù hợp.");
            return;
          }

          let intentHtml = "";
          if (data.intent) {
            const int = data.intent;
            intentHtml = `
              <div class="intent-box">
                <strong>Intent: </strong>${escapeHtml(int.query || query)}
                ${int.city ? `<span class="tag">📍 ${escapeHtml(int.city)}</span>` : ""}
                ${int.object_types && int.object_types.length ? int.object_types.map(t => `<span class="tag">🏷️ ${escapeHtml(t)}</span>`).join("") : ""}
                ${int.hard_concepts && int.hard_concepts.length ? int.hard_concepts.map(c => `<span class="tag">🔍 ${escapeHtml(c)}</span>`).join("") : ""}
                ${int.feel_concepts && int.feel_concepts.length ? int.feel_concepts.map(c => `<span class="tag">💡 ${escapeHtml(c)}</span>`).join("") : ""}
                <span class="tag">🎯 ${data.n_candidates || 0} candidates</span>
                <span class="tag">⚡ ${data.n_fused || 0} fused</span>
              </div>`;
          }

          results.innerHTML = `
            ${intentHtml}
            <h2 class="results-title">Kết quả (${hotels.length})</h2>
            ${hotels.map(renderHotel).join("")}
          `;
        } catch (err) {
          if (err.name === "AbortError" || err.message?.includes("timed out") || err.message?.includes("timeout")) {
            setState("error", "Tìm kiếm quá thời gian (>120s). Vui lòng thử lại.");
          } else {
            setState("error", `Lỗi: ${escapeHtml(err.message || "Unknown error")}`);
          }
        }
      }

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        runSearch(queryInput.value);
      });

      demoContainer.addEventListener("click", (event) => {
        if (event.target.matches("button[data-query]")) {
          queryInput.value = event.target.dataset.query;
          runSearch(queryInput.value);
        }
      });

      renderDemoQueries();
      runSearch(queryInput.value);
    </script>
  </body>
</html>
