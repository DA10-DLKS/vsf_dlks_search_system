<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DA10 — Slow Requests Tracing</title>
  <style>
    :root {
      --bg: #0f1419; --card: #1a2129; --line: #2a3441; --txt: #e4e8ed; --muted: #8b97a5;
      --intent:#6aa3ff; --filter:#37c4a8; --text_retrieval:#ff7a59; --fusion:#c084fc;
      --rerank:#facc15; --context:#4ade80; --other:#64748b;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--txt); }
    header { padding:18px 24px; border-bottom:1px solid var(--line); }
    h1 { margin:0; font-size:20px; }
    .sub { color:var(--muted); font-size:13px; margin-top:4px; }
    .controls { display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; padding:16px 24px; }
    .controls label { display:flex; flex-direction:column; font-size:12px; color:var(--muted); gap:4px; }
    input, button, select { background:var(--card); color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:7px 10px; font-size:13px; }
    button { cursor:pointer; }
    button.primary { background:#2563eb; border-color:#2563eb; }
    button:hover { filter:brightness(1.1); }
    .legend { display:flex; gap:14px; flex-wrap:wrap; padding:0 24px 12px; font-size:12px; color:var(--muted); }
    .legend span { display:inline-flex; align-items:center; gap:5px; }
    .dot { width:11px; height:11px; border-radius:2px; display:inline-block; }
    .wrap { padding:0 24px 40px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--muted); font-weight:600; font-size:12px; position:sticky; top:0; background:var(--bg); }
    td.num { text-align:right; font-variant-numeric: tabular-nums; white-space:nowrap; }
    .rid { font-family: ui-monospace, monospace; color:var(--muted); font-size:12px; }
    .query { max-width:340px; }
    .lat { font-weight:700; }
    .lat.hi { color:#f87171; } .lat.mid { color:#fbbf24; } .lat.ok { color:#4ade80; }
    .bar { display:flex; height:16px; width:260px; border-radius:4px; overflow:hidden; background:#0a0d11; }
    .seg { height:100%; }
    .breakdown { font-size:11px; color:var(--muted); margin-top:4px; }
    .slow-stage { color:#f87171; font-weight:700; }
    .empty { padding:40px; text-align:center; color:var(--muted); }
    .pill { font-size:11px; padding:2px 7px; border-radius:10px; background:var(--card); border:1px solid var(--line); }
  </style>
</head>
<body>
  <header>
    <h1>🐢 DA10 — Slow Requests Tracing</h1>
    <div class="sub">Truy vết request chậm theo <code>request_id</code> — query là gì &amp; chậm ở stage nào trong pipeline (đọc từ <code>logs/da10.jsonl</code>).</div>
  </header>

  <div class="controls">
    <label>Ngưỡng latency (ms)
      <input id="minMs" type="number" value="0" min="0" step="100" style="width:120px" />
    </label>
    <label>Số request
      <input id="limit" type="number" value="50" min="1" max="500" style="width:90px" />
    </label>
    <label>Sắp xếp
      <select id="sort">
        <option value="time">Mới nhất</option>
        <option value="latency">Latency cao → thấp</option>
      </select>
    </label>
    <button class="primary" onclick="load()">Tải lại</button>
    <label style="flex-direction:row; align-items:center; gap:6px; color:var(--txt)">
      <input id="auto" type="checkbox" /> Tự động làm mới
    </label>
    <label>Chu kỳ
      <select id="interval">
        <option value="15">15s</option>
        <option value="20" selected>20s</option>
        <option value="30">30s</option>
      </select>
    </label>
    <span id="status" class="sub"></span>
  </div>

  <div class="legend" id="legend"></div>

  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th>Thời gian</th>
          <th>request_id</th>
          <th>Endpoint</th>
          <th>Query</th>
          <th class="num">Latency</th>
          <th>Stage breakdown</th>
          <th class="num">Kết quả</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">Không có request nào khớp ngưỡng.</div>
  </div>

  <script>
    const STAGES = ["intent","filter","text_retrieval","fusion","rerank","context"];
    const COLOR = {
      intent:"var(--intent)", filter:"var(--filter)", text_retrieval:"var(--text_retrieval)",
      fusion:"var(--fusion)", rerank:"var(--rerank)", context:"var(--context)", other:"var(--other)"
    };
    let timer = null;

    function renderLegend() {
      document.getElementById("legend").innerHTML = STAGES.map(s =>
        `<span><i class="dot" style="background:${COLOR[s]}"></i>${s}</span>`).join("");
    }

    function latClass(ms) { return ms >= 2000 ? "hi" : ms >= 800 ? "mid" : "ok"; }
    function esc(s) { return (s ?? "").toString().replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

    function bar(stage_ms, latency) {
      const entries = Object.entries(stage_ms || {});
      if (!entries.length) return '<span class="sub">— (endpoint không qua pipeline)</span>';
      const total = entries.reduce((a, [,v]) => a + (v||0), 0) || 1;
      // stage chậm nhất
      let slow = entries.reduce((m, e) => e[1] > m[1] ? e : m, entries[0]);
      const segs = entries.map(([k, v]) =>
        `<div class="seg" title="${k}: ${v} ms" style="width:${(v/total*100).toFixed(1)}%;background:${COLOR[k]||COLOR.other}"></div>`
      ).join("");
      const txt = entries.sort((a,b)=>b[1]-a[1]).map(([k,v]) => {
        const lbl = `${k} ${v}ms`;
        return k === slow[0] ? `<span class="slow-stage">${lbl}</span>` : lbl;
      }).join(" · ");
      return `<div class="bar">${segs}</div><div class="breakdown">${txt}</div>`;
    }

    let lastRows = [];     // dữ liệu lần fetch gần nhất (để đổi sort không cần gọi lại API)
    let lastThreshold = 0;

    function render() {
      const st = document.getElementById("status");
      const sortBy = document.getElementById("sort").value;
      const rows = lastRows.slice();
      if (sortBy === "latency") {
        rows.sort((a, b) => (b.latency_ms || 0) - (a.latency_ms || 0));
      }   // "time": giữ nguyên thứ tự API trả (mới nhất lên đầu)
      const tbody = document.getElementById("rows");
      document.getElementById("empty").style.display = rows.length ? "none" : "block";
      tbody.innerHTML = rows.map(x => `
          <tr>
            <td class="rid">${esc((x.timestamp||"").replace("T"," ").replace("+07:00",""))}</td>
            <td class="rid">${esc(x.request_id)}</td>
            <td><span class="pill">${esc((x.event||"").replace("_completed",""))}</span></td>
            <td class="query">${esc(x.query) || '<span class="sub">—</span>'}</td>
            <td class="num lat ${latClass(x.latency_ms)}">${x.latency_ms} ms</td>
            <td>${bar(x.stage_ms, x.latency_ms)}</td>
            <td class="num">${x.n_results ?? "—"}</td>
          </tr>`).join("");
      st.textContent = `Hiển thị ${rows.length} request (ngưỡng ≥ ${lastThreshold} ms) · `
        + `sắp theo ${sortBy === "latency" ? "latency" : "thời gian"} · cập nhật ${new Date().toLocaleTimeString()}`;
    }

    async function load() {
      const minMs = document.getElementById("minMs").value || 0;
      const limit = document.getElementById("limit").value || 50;
      const st = document.getElementById("status");
      st.textContent = "Đang tải…";
      try {
        const r = await fetch(`/observability/slow_requests?min_ms=${minMs}&limit=${limit}`);
        const data = await r.json();
        lastRows = data.requests || [];
        lastThreshold = data.threshold_ms;
        render();
      } catch (e) {
        st.textContent = "Lỗi tải: " + e.message;
      }
    }

    function restartAuto() {
      clearInterval(timer);
      if (document.getElementById("auto").checked) {
        const sec = parseInt(document.getElementById("interval").value, 10) || 20;
        timer = setInterval(load, sec * 1000);
      }
    }

    // Đổi sort: render lại tại chỗ, không gọi lại API.
    document.getElementById("sort").addEventListener("change", render);
    document.getElementById("auto").addEventListener("change", restartAuto);
    document.getElementById("interval").addEventListener("change", restartAuto);

    renderLegend();
    load();
  </script>
</body>
</html>
