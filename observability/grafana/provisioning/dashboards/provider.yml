# Grafana dashboard provisioning — tự nạp mọi dashboard json trong /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: DA10
    orgId: 1
    folder: DA10
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
