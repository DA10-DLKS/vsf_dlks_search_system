# Production config (override via env vars / secrets manager)
app:
  env: prod
  log_level: WARNING

embedding:
  model: BAAI/bge-m3

vector_store:
  provider: pgvector
  database_url: ${DATABASE_URL}
  table: ${VECTOR_INDEX_TABLE}
  dimension: ${VECTOR_DIMENSION}
  top_k: ${VECTOR_TOP_K}

keyword_store:
  url: ${OPENSEARCH_URL}
  index: ${OPENSEARCH_INDEX}

retrieval:
  hybrid_top_k: 20
  rerank_top_k: 5

context:
  token_budget: 4000
