# Development config
app:
  env: dev
  log_level: INFO

embedding:
  model: BAAI/bge-m3

vector_store:
  provider: pgvector
  table: text_chunks
  dimension: 1024
  top_k: 10

keyword_store:
  url: http://localhost:9200
  index: vsf_travel

retrieval:
  hybrid_top_k: 20
  rerank_top_k: 5

context:
  token_budget: 4000
