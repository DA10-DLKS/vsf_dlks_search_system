# candidate/candidate_queue.yaml — CANDIDATE ontology (Phần 0.5 DA10 — BA THỨ TÁCH BIỆT).
# Owner: Trương Anh Long. Task 1.2 (v2) — Sprint 1.
#
# Concept ỨNG VIÊN, định nghĩa từ: review, faq, article, query log.
# CHƯA dùng cho retrieval. Quy trình lên Core (xem _meta.yaml > tiers.candidate.promotion):
#   keyword lạ lặp nhiều -> vào đây -> HUMAN duyệt -> thêm vào core/<facet>.yaml
#   -> generate lại synonym/expansion -> chạy golden set -> tốt hơn MỚI merge.
#
# HIỆN TRỐNG: chưa có review được ABSA, chưa có golden set, chưa có query log của DA09.
# Khi Sprint 2 (ABSA review) chạy hoặc nhận query log -> điền vào đây, KHÔNG tự thêm thẳng vào Core.

version: "2.0.0"

# Schema mỗi mục ứng viên:
candidate_schema:
  fields:
    candidate_keyword:   "surface form lạ gặp trong review/faq/query log"
    suggested_facet:     "facet dự đoán (object_type/amenity/purpose/style/...)"
    suggested_concept_id: "ID đề xuất nếu được duyệt (vd PURPOSE_STAYCATION)"
    frequency:           "số lần xuất hiện"
    examples:            "[câu trích dẫn nguồn]"
    source:              "review | faq | article | query_log | description (keyword scan)"
    status:              "pending | approved | rejected"

# ⚠ ĐỘ TIN: các ứng viên purpose dưới phát hiện bằng KEYWORD SCAN trên description/faq của 520
# hotel VN (KHÔNG phải ABSA trên review thật — review chưa crawl). frequency = số hotel có keyword
# trong description, là GỢI Ý độ phổ biến, CHƯA đủ mạnh để lên Core. Quy trình promote:
#   chờ review ABSA (Sprint 2) đo tần suất thật -> human duyệt -> golden set không giảm -> merge Core.
# Đã loại các purpose ĐÃ CÓ Core (wellness/romantic) khỏi danh sách ứng viên.

candidates:
  - candidate_keyword: "team building / hội nghị / sự kiện (MICE)"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_MICE          # MICE = Meetings, Incentives, Conferences, Events
    frequency: 107                              # 107/520 hotel (~20%) nhắc trong description/faq
    examples: ["team building", "hội nghị", "hội thảo", "tổ chức tiệc / gala", "sự kiện"]
    source: description
    status: pending

  - candidate_keyword: "tiệc cưới / đám cưới (wedding)"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_WEDDING
    frequency: 24                               # 24/520 (~4%)
    examples: ["tiệc cưới", "đám cưới", "wedding"]
    source: description
    status: pending

  - candidate_keyword: "workation / làm việc từ xa"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_WORKATION
    frequency: 10                               # 10/520 (~2%) — tần suất thấp
    examples: ["workation", "làm việc từ xa", "remote work"]
    source: description
    status: pending

  - candidate_keyword: "phượt / backpacker"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_BACKPACKER
    frequency: 9                                # 9/520 (~2%) — tần suất thấp
    examples: ["phượt", "đi bụi", "backpacker"]
    source: description
    status: pending

  - candidate_keyword: "staycation"
    suggested_facet: purpose
    suggested_concept_id: PURPOSE_STAYCATION
    frequency: 0                                # chưa thấy trong description; thường ở QUERY LOG/review
    examples: ["staycation", "nghỉ dưỡng tại chỗ"]
    source: query_log
    status: pending
