# core/location.yaml — facet: location (HARD fact). Địa danh + landmark.
# tier: core. Provenance: data Agoda (city/area/district + nearby_places) + domain_knowledge.
#
# LƯU Ý CHUẨN HÓA: data Agoda crawl LẪN LỘN (province==city, district==area). KE chuẩn hóa
# lại theo cây hành chính đúng. hierarchy lưu ở metadata_schema.yaml; ở đây giữ ENTITY địa danh.
#
# kind:
#   - place    : đơn vị hành chính / vùng (city, district, area) — dùng để FILTER theo destination.
#   - landmark : điểm tham quan (dùng cho quan hệ `near` ở ontology.yaml Task 1.5).
#
# Chỉ liệt kê địa danh/landmark CÓ trong 27 hotel corpus (số hotel/lần xuất hiện ghi ở description).
# Mở rộng tỉnh/thành khác khi corpus mở rộng.
# Schema: xem ontology/_meta.yaml (location dùng thêm: kind, parent, aliases thay surface_forms).
concepts:

  # ===========================================================================
  # PLACES — thành phố / điểm đến chính (từ field city, 15 nơi trong corpus)
  # ===========================================================================
  LOC_NHA_TRANG:
    facet: location
    fact_type: hard
    tier: core
    kind: place
    provenance: [agoda, domain_knowledge]
    parent: LOC_KHANH_HOA
    label: {vi: Nha Trang, en: Nha Trang}
    surface_forms:
      vi: [tp nha trang, thành phố nha trang]
      en: [nha trang]
    description: {vi: Thành phố biển Nha Trang (6 hotel trong corpus), en: Nha Trang coastal city}

  LOC_PHU_QUOC:
    facet: location
    fact_type: hard
    tier: core
    kind: place
    provenance: [agoda, domain_knowledge]
    label: {vi: Phú Quốc, en: Phu Quoc}
    surface_forms:
      vi: [phú quốc, đảo phú quốc]
      en: [phu quoc, phu quoc island]
    description: {vi: Đảo Phú Quốc (4 hotel trong corpus), en: Phu Quoc island}
    related: [SETTING_ISLAND]

  LOC_HOI_AN:
    facet: location
    fact_type: hard
    tier: core
    kind: place
    provenance: [agoda, domain_knowledge]
    label: {vi: Hội An, en: Hoi An}
