    fact_type: hard
    tier: core
    kind: place
    provenance: [agoda, domain_knowledge]
    label: {vi: Hồ Chí Minh, en: Ho Chi Minh City}
    surface_forms:
      vi: [hồ chí minh, tphcm, hcm, sài gòn, thành phố hồ chí minh]
      en: [ho chi minh, ho chi minh city, saigon, hcmc]
    description: {vi: TP. Hồ Chí Minh (2 hotel trong corpus), en: Ho Chi Minh City}

  LOC_HA_TINH:
