# ontology/query_expansion.yaml — Query Expansion (concept -> concept). Task 1.7 — Sprint 1.
# Owner: Trương Anh Long (Knowledge Engineering). Bàn giao -> Anh Tài (áp dụng lúc query).
#
# Mục đích: mở rộng concept -> concept để TĂNG RECALL. Query có concept X -> thêm các concept
# Y liên quan vào tập tìm kiếm (vd "gia đình" -> kéo thêm "kids club", "hồ bơi trẻ em").
#
# ⚠ TRẠNG THÁI: TẤT CẢ rule = unverified. DA10 yêu cầu "mỗi rule kiểm trên golden set, không
# tăng Recall thì BỎ". GOLDEN SET CHƯA CÓ (DA09 chưa cấp) -> KHÔNG đánh dấu rule nào "đã kiểm".
# Lộ trình: golden set có -> chạy A/B từng rule -> set status: verified | rejected (xóa).
# KHÔNG dùng rule unverified như đã kiểm chứng.
#
# Nguồn rule (source):
#   - related/broader/narrower: lấy từ quan hệ THẬT trong ontology/core/*.yaml.
#   - domain: logic ngành (chưa có cạnh trong ontology nhưng hợp lý) — cần golden set kiểm kỹ hơn.
#
# expands_to = list concept_id sẽ thêm khi query chứa concept khóa.

version: "2.0.0"
status: unverified           # toàn bộ file chờ golden set; xem ghi chú trên
default_weight: 0.5          # gợi ý trọng số expansion (Anh Tài tinh chỉnh); <1 để không lấn precision

rules:

  # ---- PURPOSE -> tiện ích/đặc tính phục vụ mục đích đó -----------------------
  PURPOSE_FAMILY:
    expands_to: [AMEN_KIDS_CLUB, AMEN_KIDS_POOL]
    source: related
    status: unverified
  PURPOSE_ROMANTIC:
    expands_to: [AMEN_SEA_VIEW, STYLE_ROMANTIC, AMEN_PRIVATE_POOL]
    source: related+domain         # sea_view/style_romantic từ related; private_pool từ domain
    status: unverified
  PURPOSE_BUSINESS:
    expands_to: [AMEN_WIFI, SETTING_CITY_CENTER]
    source: related+domain
    status: unverified
  PURPOSE_WELLNESS:
    expands_to: [AMEN_SPA, STYLE_QUIET, STYLE_RELAXING]
    source: related+domain
    status: unverified

  # ---- STYLE -> tiện ích/bối cảnh gợi cảm giác đó -----------------------------
  STYLE_QUIET:
    expands_to: [STYLE_RELAXING, SETTING_NATURE]
    source: related
    status: unverified
  STYLE_RELAXING:
    expands_to: [STYLE_QUIET, PURPOSE_WELLNESS, AMEN_SPA]
    source: related+domain
    status: unverified
  STYLE_ROMANTIC:
    expands_to: [PURPOSE_ROMANTIC, AMEN_SEA_VIEW]
    source: related+domain
    status: unverified
  STYLE_LUXURY:
    expands_to: [PRICE_LUXURY, AMEN_SPA, AMEN_PRIVATE_POOL, AMEN_SEA_VIEW]
    source: related+domain
    status: unverified
  STYLE_ECO:
    expands_to: [SETTING_NATURE, SETTING_MOUNTAIN]
    source: related+domain
    status: unverified

  # ---- PRICE_LUXURY (phân khúc) -> tiện ích thường đi kèm ---------------------
  PRICE_LUXURY:
    expands_to: [AMEN_SPA, AMEN_PRIVATE_POOL, AMEN_SEA_VIEW, AMEN_INFINITY_POOL]
    source: domain
    status: unverified

  # ---- SETTING -> tiện ích/đặc tính của bối cảnh ------------------------------
  SETTING_COASTAL:
    expands_to: [AMEN_BEACHFRONT, AMEN_SEA_VIEW]
    source: narrower+domain
    status: unverified
  SETTING_ISLAND:
    expands_to: [SETTING_COASTAL, AMEN_BEACHFRONT]
    source: related+domain
    status: unverified
  SETTING_NATURE:
    expands_to: [STYLE_QUIET, STYLE_ECO]
    source: related+domain
    status: unverified

  # ---- AMENITY <-> AMENITY / OBJECT (đi kèm tự nhiên) -------------------------
  AMEN_PRIVATE_POOL:
    expands_to: [OBJ_VILLA]
    source: related
    status: unverified
  AMEN_KIDS_CLUB:
    expands_to: [PURPOSE_FAMILY, AMEN_KIDS_POOL]
    source: related+domain
    status: unverified
  AMEN_SPA:
    expands_to: [PURPOSE_WELLNESS, AMEN_GYM]
    source: related+domain
    status: unverified
  AMEN_GOLF:
    expands_to: [PRICE_UPSCALE]
    source: domain
    status: unverified

  # ---- OBJECT_TYPE -> tiện ích/đặc tính đặc trưng -----------------------------
  OBJ_VILLA:
    expands_to: [AMEN_PRIVATE_POOL]
    source: related
    status: unverified
  OBJ_RESORT:
    expands_to: [AMEN_POOL, AMEN_SPA, SETTING_COASTAL]
    source: domain
    status: unverified

  # ---- LOCATION -> bối cảnh đặc trưng của địa danh (từ data thật) -------------
  LOC_PHU_QUOC:
    expands_to: [SETTING_ISLAND, AMEN_BEACHFRONT]
    source: related+domain
    status: unverified
  LOC_HON_TRE:
    expands_to: [SETTING_ISLAND]
    source: related
    status: unverified
